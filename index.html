<html lang="fr"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>ToxiGuard — Aide décisionnelle intoxications aiguës</title>
<meta name="description" content="Outil gratuit d'aide décisionnelle pour la prise en charge des intoxications aiguës en médecine d'urgence — Dr Thomas Gourdon & Claude AI">
<meta name="author" content="Dr Thomas Gourdon (médecin urgentiste) et Claude AI (Anthropic)">
<meta name="copyright" content="© 2026 Dr Thomas Gourdon & Claude AI — Licence CC BY-NC-SA 4.0">
<meta name="license" content="CC BY-NC-SA 4.0">
<meta name="keywords" content="toxicologie, intoxication, urgences, médecine, antidote, toxidrome, CAPTV, PWA, aide décisionnelle">
<meta name="theme-color" content="#1a3a5c" media="(prefers-color-scheme: light)">
<meta name="theme-color" content="#0c0f1a" media="(prefers-color-scheme: dark)">
<link rel="manifest" href="manifest.webmanifest">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="ToxiGuard">
<link rel="apple-touch-icon" href="data:image/svg+xml;utf8,%3Csvg%20xmlns%3D%22http%3A%2F%2Fwww.w3.org%2F2000%2Fsvg%22%20viewBox%3D%220%200%20200%20200%22%3E%3Crect%20width%3D%22200%22%20height%3D%22200%22%20fill%3D%22%231a3a5c%22%2F%3E%3Cpath%20d%3D%22M100%2030%20L160%2056%20L160%20104%20Q160%20148%20100%20168%20Q40%20148%2040%20104%20L40%2056%20Z%22%20fill%3D%22%233dd0b8%22%2F%3E%3Crect%20x%3D%2284%22%20y%3D%22102%22%20width%3D%2232%22%20height%3D%2212%22%20rx%3D%222%22%20fill%3D%22%230d2d4f%22%2F%3E%3Crect%20x%3D%2294%22%20y%3D%2292%22%20width%3D%2212%22%20height%3D%2232%22%20rx%3D%222%22%20fill%3D%22%230d2d4f%22%2F%3E%3C%2Fsvg%3E">
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');
:root{--bg:#eef1f6;--bg2:#f7f9fc;--card:#fff;--card-glass:rgba(255,255,255,.7);--accent:#e94560;--accent-grad:linear-gradient(135deg,#e94560 0%,#d6336c 100%);--accent2:#1a3a5c;--sec:#f3f6fa;--txt:#1a1a2e;--txt2:#4a5568;--border:#e2e8f0;--border-soft:rgba(226,232,240,.6);--green:#16a34a;--yellow:#d97706;--orange:#ea580c;--red:#dc2626;--blue:#2563eb;--purple:#7c3aed;--teal:#0d9488;--r:14px;--r-lg:18px;--dim:#94a3b8;--header-bg:linear-gradient(135deg,#1a3a5c 0%,#0f2744 100%);--header-txt:#f8fafc;--nav-bg:#fff;--nav-active:#e94560;--nav-active-txt:#fff;--shadow:0 1px 3px rgba(15,39,68,.06),0 1px 2px rgba(15,39,68,.04);--shadow-lg:0 8px 28px rgba(15,39,68,.10),0 2px 8px rgba(15,39,68,.06);--shadow-xl:0 20px 50px rgba(15,39,68,.15);--gap:16px;--card-pad:20px;--transition:all .25s cubic-bezier(.4,0,.2,1)}
[data-theme="dark"]{--bg:#0a0d18;--bg2:#0f1322;--card:#161b2e;--card-glass:rgba(22,27,46,.7);--sec:#1c2240;--txt:#e2e8f0;--txt2:#94a3b8;--border:#2d3654;--border-soft:rgba(45,54,84,.5);--dim:#64748b;--header-bg:linear-gradient(135deg,#0d1b2e 0%,#060d19 100%);--header-txt:#e2e8f0;--nav-bg:#161b2e;--shadow:0 1px 3px rgba(0,0,0,.4);--shadow-lg:0 8px 28px rgba(0,0,0,.45),0 2px 8px rgba(0,0,0,.3);--shadow-xl:0 20px 50px rgba(0,0,0,.55);--green:#22c55e;--yellow:#fbbf24;--orange:#fb923c;--red:#f87171;--blue:#60a5fa;--purple:#a78bfa;--teal:#2dd4bf;--accent-grad:linear-gradient(135deg,#f87171 0%,#e94560 100%)}
*{box-sizing:border-box;margin:0;padding:0}
input,select,textarea,button{box-sizing:border-box;max-width:100%}
.detail-section{overflow:hidden}
.form-row{flex-wrap:wrap}
.form-row input,.form-row select{min-width:0;width:100%}
body{font-family:'Inter',system-ui,-apple-system,sans-serif;background:var(--bg);background-image:radial-gradient(circle at 10% 0%,rgba(233,69,96,.04) 0%,transparent 45%),radial-gradient(circle at 90% 100%,rgba(26,58,92,.05) 0%,transparent 45%);color:var(--txt);min-height:100vh;min-height:100dvh;padding-bottom:76px;transition:background .3s,color .3s;-webkit-font-smoothing:antialiased}
[data-theme="dark"] body{background-image:radial-gradient(circle at 10% 0%,rgba(248,113,113,.06) 0%,transparent 45%),radial-gradient(circle at 90% 100%,rgba(45,212,191,.04) 0%,transparent 45%)}
@media(min-width:769px){body{padding-bottom:0}}

/* HEADER */
header{background:var(--header-bg);color:var(--header-txt);padding:16px 20px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:50;backdrop-filter:blur(12px)}
.logo-area{display:flex;align-items:center;gap:14px}
.logo-area h1{font-size:1.4rem;font-weight:800;letter-spacing:-.5px}
.logo-area .subtitle{font-size:.65rem;letter-spacing:2px;opacity:.6;display:block;margin-top:1px;text-transform:uppercase;font-weight:500}
.logo-light{display:block}.logo-dark{display:none}
[data-theme="dark"] .logo-light{display:none}
[data-theme="dark"] .logo-dark{display:block}
.header-actions{display:flex;gap:8px;align-items:center}
.theme-toggle{background:rgba(255,255,255,.1);border:1.5px solid rgba(255,255,255,.2);color:var(--header-txt);width:38px;height:38px;border-radius:10px;cursor:pointer;font-size:1.1rem;display:flex;align-items:center;justify-content:center;transition:var(--transition)}
.theme-toggle:hover{background:rgba(255,255,255,.2);border-color:rgba(255,255,255,.35)}

/* NAV — desktop top, mobile bottom */
nav#tabs{display:flex;gap:4px;background:var(--nav-bg);padding:6px 12px;border-bottom:1px solid var(--border);transition:background .3s;overflow-x:auto;-webkit-overflow-scrolling:touch}
nav#tabs::-webkit-scrollbar{display:none}
nav#tabs .nav-tab{flex:1;padding:10px 8px;border:none;border-radius:10px;cursor:pointer;font-size:.82rem;font-weight:600;background:transparent;color:var(--txt2);transition:var(--transition);white-space:nowrap;display:flex;flex-direction:column;align-items:center;gap:3px;min-width:0}
nav#tabs .nav-tab .tab-icon{font-size:1.15rem;line-height:1}
nav#tabs .nav-tab .tab-label{font-size:.7rem;line-height:1}
nav#tabs .nav-tab.active{background:var(--accent-grad);color:var(--nav-active-txt);box-shadow:0 4px 14px rgba(233,69,96,.35)}
nav#tabs .nav-tab:hover:not(.active){background:var(--sec);color:var(--txt)}
@media(max-width:768px){
  nav#tabs{position:fixed;bottom:0;left:0;right:0;z-index:50;border-bottom:none;border-top:1px solid var(--border);padding:4px 8px 8px;padding-bottom:max(8px,env(safe-area-inset-bottom));box-shadow:0 -2px 12px rgba(0,0,0,.08)}
  [data-theme="dark"] nav#tabs{box-shadow:0 -2px 12px rgba(0,0,0,.3)}
  nav#tabs .nav-tab{padding:6px 4px;border-radius:8px}
  nav#tabs .nav-tab .tab-icon{font-size:1.3rem}
}

/* CONTENT */
#content{max-width:1200px;margin:0 auto;padding:var(--gap);animation:fadeIn .25s ease}
@keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}

/* SEARCH */
.search-bar{display:flex;gap:10px;margin-bottom:var(--gap);flex-wrap:wrap}
.search-bar input,.search-bar select{padding:10px 14px;border:1.5px solid var(--border);border-radius:10px;font-size:.85rem;background:var(--card);color:var(--txt);transition:var(--transition);font-family:inherit}
.search-bar input{flex:1;min-width:180px}
.search-bar input:focus,.search-bar select:focus{outline:none;border-color:var(--accent);box-shadow:0 0 0 3px rgba(233,69,96,.1)}
.search-bar select{min-width:160px;cursor:pointer}

/* MOLECULE GRID */
.mol-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:var(--gap)}
@media(max-width:640px){.mol-grid{grid-template-columns:1fr}}

/* MOLECULE CARD */
.mol-card{background:var(--card);border:1.5px solid var(--border-soft);border-radius:var(--r-lg);padding:var(--card-pad);transition:var(--transition);box-shadow:var(--shadow);cursor:pointer;position:relative;overflow:hidden;backdrop-filter:blur(8px)}
.mol-card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:var(--accent-grad);opacity:0;transition:opacity .25s}
.mol-card::after{content:'';position:absolute;inset:0;background:linear-gradient(135deg,rgba(233,69,96,.03) 0%,transparent 60%);opacity:0;transition:opacity .25s;pointer-events:none;border-radius:var(--r-lg)}
.mol-card:hover{transform:translateY(-3px);box-shadow:var(--shadow-lg);border-color:rgba(233,69,96,.25)}
.mol-card:hover::before,.mol-card:hover::after{opacity:1}
.mol-card.selected{border-color:var(--accent);box-shadow:0 0 0 2px var(--accent),var(--shadow-lg)}
.mol-card.selected::before{opacity:1}
.mol-header{display:flex;justify-content:space-between;align-items:start;gap:8px;margin-bottom:8px}
.mol-header h3{font-size:.95rem;font-weight:700;line-height:1.3}
.class-badge{display:inline-flex;align-items:center;padding:3px 8px;border-radius:6px;font-size:.7rem;font-weight:600;white-space:nowrap;flex-shrink:0}
.mol-meta{display:flex;gap:10px;font-size:.75rem;color:var(--dim);margin:6px 0 8px;flex-wrap:wrap}
.mol-meta span{display:inline-flex;align-items:center;gap:3px}
.mol-graves{display:flex;flex-direction:column;gap:3px;margin:8px 0}
.mol-graves span{font-size:.78rem;color:var(--red);display:flex;align-items:start;gap:4px;line-height:1.3}
.mol-footer{display:flex;justify-content:flex-end;margin-top:10px}
.btn-detail{background:transparent;border:1.5px solid var(--border);color:var(--accent);padding:7px 14px;border-radius:10px;cursor:pointer;font-size:.78rem;font-weight:600;transition:var(--transition);font-family:inherit}
.btn-detail:hover{background:var(--accent-grad);color:#fff;border-color:transparent;box-shadow:0 4px 12px rgba(233,69,96,.3);transform:translateY(-1px)}

/* SELECTION BANNER */
.sel-banner{display:flex;gap:8px;margin-bottom:var(--gap);flex-wrap:wrap;align-items:center}
.sel-badge{display:inline-flex;align-items:center;padding:5px 12px;border-radius:8px;font-size:.78rem;cursor:pointer;border:none;font-weight:600;font-family:inherit;transition:var(--transition)}
.sel-badge-main{background:var(--accent);color:#fff}
.sel-badge-main:hover{background:#d63851}

/* INTERACTION BANNER */
.inter-banner{background:var(--card);border:1.5px solid rgba(233,69,96,.25);border-radius:var(--r-lg);padding:18px;margin-bottom:var(--gap);box-shadow:var(--shadow-lg)}
.inter-banner .inter-title{font-weight:800;color:var(--accent);margin-bottom:12px;font-size:.95rem;display:flex;align-items:center;gap:8px}
.inter-section-title{font-size:.78rem;font-weight:700;text-transform:uppercase;letter-spacing:.6px;color:var(--dim);margin:14px 0 6px}
.inter-item{margin-top:8px;padding:11px 14px;background:var(--sec);border-radius:10px;border-left:4px solid var(--red);font-size:.85rem;line-height:1.55}
.inter-item.critique{border-left-color:#dc2626;background:linear-gradient(90deg,rgba(220,38,38,.06) 0%,var(--sec) 80%)}
.inter-item.haute{border-left-color:#ea580c}
.inter-item.moyenne{border-left-color:#f59e0b}
.inter-item.info{border-left-color:#2563eb}
.inter-item .inter-lbl{display:inline-block;padding:2px 8px;border-radius:5px;font-size:.7rem;font-weight:700;margin-right:8px;letter-spacing:.3px}
.inter-item.critique .inter-lbl{background:#dc2626;color:#fff}
.inter-item.haute .inter-lbl{background:#ea580c;color:#fff}
.inter-item.moyenne .inter-lbl{background:#f59e0b;color:#fff}
.inter-item.info .inter-lbl{background:#2563eb;color:#fff}
.inter-item strong.inter-mols{display:block;font-size:.85rem;margin-bottom:4px;font-weight:700}
.cumul-item{margin-top:8px;padding:11px 14px;border-radius:10px;border-left:4px solid;font-size:.85rem;line-height:1.55;background:var(--sec)}
.cumul-count{display:inline-block;background:var(--card);border:1.5px solid currentColor;padding:1px 8px;border-radius:8px;font-size:.72rem;font-weight:800;margin-left:6px}

/* DETAIL GRID */
.detail-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(260px,1fr));gap:var(--gap)}
@media(max-width:640px){.detail-grid{grid-template-columns:1fr}}
.detail-section{background:var(--sec);border-radius:var(--r);padding:var(--card-pad)}
.detail-section h4{margin:0 0 12px;color:var(--accent);font-size:.9rem;font-weight:700;display:flex;align-items:center;gap:6px}
.detail-section p{margin:4px 0;font-size:.84rem;line-height:1.55;color:var(--txt)}

/* MODAL */
.modal-overlay{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(15,39,68,.55);z-index:200;display:flex;align-items:center;justify-content:center;padding:16px;backdrop-filter:blur(8px);animation:fadeIn .25s cubic-bezier(.4,0,.2,1)}
[data-theme="dark"] .modal-overlay{background:rgba(0,0,0,.65)}
.modal-content{background:var(--card);border-radius:var(--r-lg);max-width:820px;width:100%;max-height:88vh;overflow-y:auto;box-shadow:var(--shadow-xl);position:relative;animation:slideUp .3s cubic-bezier(.4,0,.2,1)}
@keyframes slideUp{from{opacity:0;transform:translateY(20px) scale(.98)}to{opacity:1;transform:translateY(0) scale(1)}}
.modal-header{position:sticky;top:0;background:var(--card);padding:20px 24px 16px;border-bottom:1px solid var(--border);z-index:1;display:flex;justify-content:space-between;align-items:center}
.modal-header h2{font-size:1.15rem;font-weight:800}
.modal-close{background:var(--sec);border:none;width:34px;height:34px;border-radius:8px;cursor:pointer;font-size:1.1rem;color:var(--txt2);display:flex;align-items:center;justify-content:center;transition:var(--transition)}
.modal-close:hover{background:var(--border);color:var(--txt)}
.modal-body{padding:20px 24px 24px}
.modal-tabs{display:flex;gap:6px;padding:0 24px;background:var(--card);overflow-x:auto;-webkit-overflow-scrolling:touch}
.modal-tabs::-webkit-scrollbar{display:none}
.modal-tab{padding:10px 14px;border:none;border-bottom:2px solid transparent;cursor:pointer;font-size:.8rem;font-weight:600;background:none;color:var(--txt2);transition:var(--transition);white-space:nowrap;font-family:inherit}
.modal-tab.active{color:var(--accent);border-bottom-color:var(--accent)}
.modal-tab:hover:not(.active){color:var(--txt)}
@media(max-width:640px){.modal-content{max-height:95vh;border-radius:14px 14px 0 0;align-self:flex-end}.modal-header{padding:16px 16px 12px}.modal-body{padding:14px 16px 20px}.modal-tabs{padding:0 16px}}

/* TABS (general) */
.tab{padding:8px 16px;border:1.5px solid var(--border);border-radius:10px;cursor:pointer;font-size:.82rem;background:var(--card);color:var(--txt);transition:var(--transition);font-weight:600;font-family:inherit}
.tab.active{background:var(--accent-grad);color:#fff;border-color:transparent;box-shadow:0 4px 12px rgba(233,69,96,.3)}
.tab:hover:not(.active){background:var(--sec);border-color:var(--accent);color:var(--accent)}

/* FORM */
.form-row{display:flex;align-items:center;gap:10px;margin:6px 0}
.form-row label{font-size:.82rem;font-weight:600;min-width:90px;color:var(--txt2)}
.form-row input,.form-row select{flex:1;padding:8px 12px;border:1.5px solid var(--border);border-radius:8px;background:var(--card);color:var(--txt);font-size:.85rem;font-family:inherit;transition:var(--transition)}
.form-row input:focus,.form-row select:focus{outline:none;border-color:var(--accent);box-shadow:0 0 0 3px rgba(233,69,96,.1)}

/* TOOLS */
.tools-menu{display:grid;grid-template-columns:repeat(auto-fill,minmax(155px,1fr));gap:12px;margin-bottom:20px}
@media(max-width:640px){.tools-menu{grid-template-columns:repeat(2,1fr)}}
.tool-card{background:var(--card);border:1.5px solid var(--border-soft);border-radius:var(--r);padding:16px 12px;cursor:pointer;text-align:center;transition:var(--transition);box-shadow:var(--shadow);position:relative;overflow:hidden}
.tool-card::before{content:'';position:absolute;inset:0;background:var(--accent-grad);opacity:0;transition:opacity .25s;border-radius:var(--r);z-index:0}
.tool-card>*{position:relative;z-index:1;transition:color .25s}
.tool-card:hover{transform:translateY(-3px);box-shadow:var(--shadow-lg);border-color:transparent}
.tool-card:hover::before{opacity:1}
.tool-card:hover .tool-name,.tool-card:hover .tool-icon{color:#fff}
.tool-card:active{transform:scale(.97)}
.tool-card .tool-icon{font-size:1.8rem;margin-bottom:6px}
.tool-card .tool-name{font-size:.78rem;font-weight:600;color:var(--txt);line-height:1.3}
.tool-back{background:var(--sec);border:1.5px solid var(--border);color:var(--txt);padding:9px 18px;border-radius:10px;cursor:pointer;font-size:.85rem;font-weight:600;transition:var(--transition);font-family:inherit}
.tool-back:hover{border-color:var(--accent);color:var(--accent);background:rgba(233,69,96,.05)}

/* CANVAS */
.canvas-wrap{margin:16px 0;overflow-x:auto;-webkit-overflow-scrolling:touch}

/* VERSION + SOURCES */
.footer-meta{position:fixed;bottom:82px;right:12px;display:flex;gap:6px;align-items:center;z-index:10}
@media(min-width:769px){.footer-meta{bottom:12px}}
.version-badge{background:var(--card);color:var(--dim);padding:4px 9px;border-radius:7px;font-size:.65rem;font-weight:600;opacity:.6;border:1px solid var(--border)}
.src-link{background:var(--card);color:var(--dim);padding:4px 9px;border-radius:7px;font-size:.7rem;font-weight:600;opacity:.7;border:1px solid var(--border);cursor:pointer;font-family:inherit;transition:var(--transition)}
.src-link:hover{opacity:1;color:var(--accent);border-color:var(--accent)}
@media(min-width:769px){.version-badge{bottom:12px}}

/* EMPTY STATE */
.empty-state{text-align:center;padding:48px 20px;color:var(--dim)}
.empty-state .empty-icon{font-size:3rem;margin-bottom:12px;opacity:.5}
.empty-state p{font-size:.9rem}

/* SEVERITY DOT */
.sev-dot{width:8px;height:8px;border-radius:50%;display:inline-block;flex-shrink:0;margin-top:4px}
.sev-dot.high{background:var(--red)}
.sev-dot.mod{background:var(--orange)}

/* STAT CARD */
.stat-card{background:var(--card);border:1.5px solid var(--border-soft);border-radius:var(--r);padding:14px 16px;box-shadow:var(--shadow);transition:var(--transition)}
.stat-card:hover{transform:translateY(-1px);box-shadow:var(--shadow-lg)}
.stat-card .stat-value{font-size:1.6rem;font-weight:800;color:var(--accent);line-height:1.2}
.stat-card .stat-label{font-size:.75rem;color:var(--dim);font-weight:500;margin-top:2px;text-transform:uppercase;letter-spacing:.4px}

/* SCROLLBAR */
::-webkit-scrollbar{width:6px;height:6px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}
::-webkit-scrollbar-thumb:hover{background:var(--dim)}

/* SELECTION INDICATOR */
.sel-count{position:absolute;top:-4px;right:-4px;background:var(--accent);color:#fff;font-size:.65rem;font-weight:700;width:18px;height:18px;border-radius:50%;display:flex;align-items:center;justify-content:center;border:2px solid var(--card)}

/* INDEX ALPHABETIQUE */
.alpha-index{display:flex;flex-wrap:wrap;gap:3px;margin:6px 0 14px;padding:8px 10px;background:var(--card);border:1.5px solid var(--border-soft);border-radius:10px;box-shadow:var(--shadow);justify-content:center;position:sticky;top:0;z-index:5;backdrop-filter:blur(8px);background:var(--card-glass)}
.alpha-index button{min-width:28px;height:28px;padding:0 6px;border:1.5px solid var(--border);background:var(--card);color:var(--txt2);border-radius:6px;cursor:pointer;font-size:.78rem;font-weight:700;font-family:inherit;transition:var(--transition);display:flex;align-items:center;justify-content:center}
.alpha-index button.alpha-active{background:var(--accent-grad);color:#fff;border-color:transparent;box-shadow:0 2px 6px rgba(233,69,96,.3)}
.alpha-index button:not(.alpha-disabled):hover{background:var(--sec);border-color:var(--accent);color:var(--accent)}
.alpha-index button.alpha-disabled{opacity:.3;cursor:default;color:var(--dim)}
@media(max-width:768px){.alpha-index button{min-width:24px;height:26px;font-size:.72rem;padding:0 4px}}

/* ALGO SVG — classes thème-aware */
.algo-svg .a-box{fill:var(--sec);stroke:var(--border);stroke-width:1.5}

function toggleSign(group,label){
var key=group+'|'+label;
var idx=selectedSigns.findIndex(function(s){return s._k===key});
if(idx>=0)selectedSigns.splice(idx,1);
else{var sig=clinicalSigns[group].find(function(s){return s.l===label});if(sig){var copy={l:sig.l,k:sig.k,g:group,_k:key};selectedSigns.push(copy);}}
render();
}
function clearSigns(){selectedSigns=[];render();}

function buildSignSearchPanel(nResults){
var h='<div class="detail-section" style="margin-bottom:14px;background:linear-gradient(135deg,rgba(13,148,136,.05) 0%,var(--sec) 100%);border-left:4px solid var(--teal)">';
h+='<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;flex-wrap:wrap;gap:8px"><h4 style="color:var(--teal);margin:0">🩺 Sélectionnez les signes cliniques observés</h4>';
if(selectedSigns.length>0)h+='<button class="tool-back" onclick="clearSigns()" style="font-size:.78rem;padding:5px 12px">✕ Effacer ('+selectedSigns.length+')</button>';
h+='</div>';
h+='<p style="font-size:.78rem;color:var(--dim);margin-bottom:14px;line-height:1.5">Les molécules compatibles seront affichées ci-dessous, triées par nombre de signes correspondants. Les signes marqués comme <strong style="color:var(--red)">graves</strong> dans une fiche augmentent la pertinence du diagnostic.</p>';
Object.keys(clinicalSigns).forEach(function(g){
h+='<div style="margin-bottom:10px"><p style="font-size:.72rem;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:var(--txt2);margin-bottom:5px">'+g+'</p><div style="display:flex;flex-wrap:wrap;gap:5px">';
clinicalSigns[g].forEach(function(s){
var sel=selectedSigns.some(function(x){return x._k===g+'|'+s.l});
h+='<button onclick="toggleSign(\''+g+'\',\''+s.l.replace(/'/g,"\\'")+'\')" style="padding:5px 10px;border:1.5px solid '+(sel?'var(--teal)':'var(--border)')+';background:'+(sel?'var(--teal)':'var(--card)')+';color:'+(sel?'#fff':'var(--txt2)')+';border-radius:6px;font-size:.74rem;font-weight:600;cursor:pointer;font-family:inherit;transition:var(--transition)">'+s.l+'</button>';
});
h+='</div></div>';
});
if(selectedSigns.length>0)h+='<p style="margin-top:12px;padding:8px 12px;background:var(--card);border-radius:8px;font-size:.82rem"><strong style="color:var(--teal)">'+nResults+' molécule'+(nResults>1?'s':'')+' compatible'+(nResults>1?'s':'')+'</strong> avec '+selectedSigns.length+' signe'+(selectedSigns.length>1?'s':'')+' sélectionné'+(selectedSigns.length>1?'s':'')+' — triées par pertinence</p>';
else h+='<p style="margin-top:12px;padding:8px 12px;background:var(--card);border-radius:8px;font-size:.82rem;color:var(--dim);font-style:italic">Aucun signe sélectionné — cochez les signes observés chez le patient pour démarrer la recherche.</p>';
h+='</div>';
return h;
}

function scoreMoleculeBySigns(m,signs){
if(!signs||signs.length===0)return 0;
var text=(m.signes.map(function(s){return s.t}).join(' ')+' '+(m.physiopath||'')+' '+m.classe+' '+(m.surveillance||[]).join(' ')).toLowerCase();
var score=0,gravesMatched=0;
signs.forEach(function(sig){
var ok=sig.k.some(function(kw){return text.includes(kw)});
if(ok){
score++;
// Bonus si le signe est marqué grave dans la fiche
var gravesText=m.signes.filter(function(s){return s.g}).map(function(s){return s.t.toLowerCase()}).join(' ');
if(sig.k.some(function(kw){return gravesText.includes(kw)}))gravesMatched++;
}
});
return {n:score,total:signs.length,graves:gravesMatched};
}

{nom:"Anticoagulants oraux directs (AOD)",classe:"Anticoagulant",demiVie:"Apixaban 12h, rivaroxaban 5-13h, édoxaban 10-14h, dabigatran 12-17h (allongée si IR)",pic:"1-4h PO",doseToxique:"Surdosage souvent bien toléré si fonction rénale normale. Risque = HÉMORRAGIE (majorée si IR, sujet âgé, poids extrême, association antiagrégant/AINS). Pas de seuil fixe.",physiopath:"Inhibiteurs directs et sélectifs de la coagulation : anti-Xa (apixaban, rivaroxaban, édoxaban = \u00ab xabans \u00bb) ou anti-IIa/thrombine (dabigatran). Effet anticoagulant immédiat et prévisible, SANS antagonisme par la vitamine K. Élimination rénale variable — dabigatran ~80% rénal (accumulation majeure si IR).",aliases:["AOD","AOAD","NACO","DOAC","apixaban","Eliquis","rivaroxaban","Xarelto","édoxaban","Lixiana","dabigatran","Pradaxa","anticoagulant oral direct","anti-Xa","anti-IIa","xaban"],signes:[{t:"Hémorragie (digestive, intracrânienne, urinaire) — risque vital si grave",g:1},{t:"Hématomes spontanés, ecchymoses extensives",g:0},{t:"Épistaxis, gingivorragies",g:0},{t:"Choc hémorragique",g:1},{t:"Insuffisance rénale aiguë majorant l accumulation (dabigatran ++)",g:1},{t:"Anémie aiguë",g:0}],traitement:["Arrêt de l AOD","Charbon activé si <2-4h post-ingestion (réduit l absorption)","DABIGATRAN : Idarucizumab (Praxbind\u00ae) 5 g IV (2\u00d72,5 g) — antidote SPÉCIFIQUE, neutralisation immédiate","ANTI-Xa (apixaban/rivaroxaban) : Andexanet alfa (Ondexxya\u00ae) si hémorragie grave — disponibilité et coût limités","À défaut d antidote : CCP/PPSB 25-50 UI/kg (anti-Xa) — efficacité partielle","DABIGATRAN : hémodialyse possible (faible liaison protéique) si IR + hémorragie grave","Acide tranexamique en adjuvant ; transfusion selon besoins","NE PAS utiliser vitamine K ni PFC seuls (INEFFICACES sur les AOD)"],surveillance:["Dosage spécifique : activité anti-Xa calibrée (apixaban/rivaroxaban/édoxaban) ; temps de thrombine dilué ou test à l écarine (dabigatran)","TP/TCA peu fiables (peuvent être normaux malgré anticoagulation)","NFS, hémoglobine /6h si saignement","Fonction rénale (créatinine — clé pour le dabigatran)","Imagerie si point d appel hémorragique"],sortie:["Absence de saignement actif, hémoglobine stable","Fonction rénale stable","Délai d élimination respecté (selon molécule et DFG)","Reprise/relais anticoagulant rediscuté"],pharma:{vd:"Apixaban ~0,3 L/kg, rivaroxaban ~0,7 L/kg, dabigatran ~0,9-1,8 L/kg",lp:"Apixaban 87%, rivaroxaban 92-95%, dabigatran ~35%",metab:"Xabans : CYP3A4 + P-gp (interactions : azolés, inhibiteurs de protéase, rifampicine). Dabigatran : prodrogue (dabigatran etexilate), pas de CYP, P-gp, élimination rénale ~80%.",ecg:"Normal (pas de toxicité rythmique propre).",epuration:"DABIGATRAN dialysable (faible liaison protéique). XABANS NON dialysables (forte liaison protéique)."},pediatrie:{seuilTox:"Ingestion accidentelle de comprimés du parent — risque hémorragique surtout si quantité importante ou IR.",antidote:"Charbon activé si précoce. Idarucizumab (dabigatran) ; CCP si hémorragie grave sous anti-Xa. Avis CAPTV systématique.",particularites:"Données pédiatriques limitées. Surveillance hémorragique et fonction rénale.",redFlags:"Saignement actif, troubles hémodynamiques, céphalées/vomissements (hémorragie intracrânienne)."}},
{"nom": "Sulfamides hypoglycémiants", "classe": "Antidiabétique", "demiVie": "Glibenclamide ~10h (effet prolongé), gliclazide 12-20h, glimépiride 5-8h ; répaglinide (glinide) 1h", "pic": "1-4h PO (formes LP retardées)", "doseToxique": "Toute prise chez un non-diabétique = risque d'hypoglycémie. 1 comprimé peut être dangereux chez l'enfant. Hypoglycémie RETARDÉE et PROLONGÉE/récidivante (jusqu'à 24-72h, surtout glibenclamide / si IR).", "physiopath": "Fermeture des canaux K-ATP des cellules bêta pancréatiques → dépolarisation → sécrétion d'insuline ENDOGÈNE indépendante de la glycémie → hypoglycémie. Effet prolongé (longue durée d'action, métabolites actifs, accumulation si insuffisance rénale ou hépatique).", "aliases": ["sulfamide hypoglycémiant", "sulfonylurée", "sulfonylurea", "glibenclamide", "Daonil", "Hemi-Daonil", "gliclazide", "Diamicron", "glimépiride", "Amarel", "glipizide", "Glibénèse", "glimepiride", "répaglinide", "Novonorm", "glinide"], "signes": [{"t": "Hypoglycémie sévère / coma hypoglycémique", "g": 1}, {"t": "Convulsions", "g": 1}, {"t": "Hypoglycémie RÉCIDIVANTE et retardée (rebond après resucrage)", "g": 1}, {"t": "Sueurs profuses, tremblements, palpitations", "g": 0}, {"t": "Déficit neurologique focal mimant un AVC", "g": 0}, {"t": "Confusion, troubles du comportement", "g": 0}], "traitement": ["Resucrage : G30% IV 0,5-1 mL/kg bolus puis perfusion G10% continue (objectif glycémie >1 g/L)", "OCTRÉOTIDE 50-100 µg SC ou IV /8-12h = ANTIDOTE de choix (inhibe la sécrétion d'insuline → prévient les rechutes, réduit le besoin de glucose)", "ÉVITER le glucagon (libère de l'insuline → peut aggraver) sauf dépannage sans abord veineux", "Charbon activé si <1-2h", "Hospitalisation et surveillance PROLONGÉE ≥24h (formes LP / IR plus longtemps) — risque de rechute après arrêt du glucose"], "surveillance": ["Glycémie capillaire /1h puis espacée si stable — NE PAS arrêter à la 1re normalisation (rechute fréquente)", "Peptide C / insulinémie si doute insuline ex {"nom": "Agents méthémoglobinisants", "classe": "Méthémoglobinisant", "demiVie": "Variable selon agent (dapsone : T½ longue 20-30h + cycle entéro-hépatique)", "pic": "Variable selon agent et voie", "doseToxique": "Méthémoglobinémie symptomatique >15-20% ; sévère >30% ; menace vitale >50-70%. Seuil abaissé si anémie, cardiopathie, nourrisson, déficit en G6PD.", "physiopath": "Oxydation du fer de l'hémoglobine Fe2+ → Fe3+ (méthémoglobine, incapable de fixer l'O2) + déplacement à gauche de la courbe de dissociation → hypoxie tissulaire malgré une PaO2 normale. Agents : dapsone, nitrites/nitrates (poppers, eau de puits), anesthésiques locaux (prilocaïne, benzocaïne, lidocaïne), sulfamides, métoclopramide, aniline, chlorates.", "aliases": ["méthémoglobinémie", "méthémoglobinisant", "metHb", "dapsone", "Disulone", "nitrites", "poppers", "nitrate", "prilocaïne", "benzocaïne", "EMLA", "lidocaïne", "aniline", "chlorate", "sulfones"], "signes": [{"t": "Cyanose gris-ardoise NE répondant PAS à l'oxygène", "g": 1}, {"t": "SpO2 plafonnant ~85%, discordante avec la PaO2", "g": 1}, {"t": "Troubles de conscience, convulsions, coma (metHb élevée)", "g": 1}, {"t": "Acidose métabolique, arythmie, collapsus (metHb sévère)", "g": 1}, {"t": "Hémolyse (dapsone, déficit en G6PD)", "g": 1}, {"t": "Sang couleur chocolat", "g": 0}, {"t": "Dyspnée, céphalées, fatigue", "g": 0}], "traitement": ["Oxygène 100%", "BLEU DE MÉTHYLÈNE 1-2 mg/kg IV en 5 min (antidote) si metHb >20-30% ou signes d'hypoxie ; renouvelable à 30-60 min (max ~7 mg/kg)", "NE PAS donner de bleu de méthylène si déficit en G6PD (inefficace + risque d'hémolyse) ni sous sérotoninergiques (effet IMAO → syndrome sérotoninergique)", "Dapsone : charbon activé en doses répétées (cycle entéro-hépatique) + bleu de méthylène souvent à répéter (effet prolongé)", "Si bleu de méthylène inefficace/CI : acide ascorbique haute dose, exsanguino-transfusion, voire OHB en sauvetage", "Retrait de l'agent / décontamination"], "surveillance": ["Méthé {"nom": "Protoxyde d'azote (N₂O)", "classe": "Gaz toxique", "demiVie": "Élimination pulmonaire rapide (minutes) ; la TOXICITÉ neurologique est liée à l'usage RÉPÉTÉ/chronique (effet cumulatif sur la B12)", "pic": "Immédiat (euphorie brève, quelques minutes)", "doseToxique": "Pas de seuil aigu défini. Toxicité neurologique liée à un usage répété/intensif (cartouches, bonbonnes/« Galaxy gas »). Risque aigu = ASPHYXIE hypoxique (inhalation en espace clos / ballon, déplacement de l'O₂).", "physiopath": "Le N₂O OXYDE le cobalt de la vitamine B12 (Co+ → Co3+) → INACTIVATION de la méthionine synthase → carence FONCTIONNELLE en B12 (la B12 sérique peut être NORMALE). Conséquences : myéloneuropathie (dégénérescence combinée subaiguë de la moelle — cordons postérieurs + faisceaux pyramidaux), anémie macrocytaire, et HYPERHOMOCYSTÉINÉMIE (risque thrombotique veineux/artériel). Risque aigu d'hypoxie (déplacement de l'O₂) et de barotraumatisme/gelures (gaz détendu très froid des bonbonnes).", "aliases": ["protoxyde d'azote", "N2O", "N₂O", "proto", "gaz hilarant", "ballon", "ballons", "cartouche", "bonbonne", "crème chantilly", "whippet", "whippits", "nitrous", "NOS", "Galaxy gas", "oxyde nitreux", "laughing gas"], "signes": [{"t": "Aigu : euphorie, fou rire, vertiges, paresthésies transitoires", "g": 0}, {"t": "Aigu : hypoxie / cyanose / perte de connaissance (inhalation en espace clos ou au masque)", "g": 1}, {"t": "Aigu : gelures pharyngo-laryngées, pneumomédiastin/barotraumatisme (gaz froid des bonbonnes)", "g": 1}, {"t": "Chronique : paraesthésies des 4 membres (débute aux membres inférieurs)", "g": 0}, {"t": "Chronique : ataxie proprioceptive, troubles de la marche, Romberg positif (syndrome cordonal postérieur)", "g": 1}, {"t": "Chronique : para-/tétraparésie spastique, troubles sphinctériens", "g": 1}, {"t": "Chronique : thrombose veineuse/artérielle (hyperhomocystéinémie)", "g": 1}, {"t": "Chronique : anémie macrocytaire, troubles cognitifs/psychiatriques", "g": 0}], "tr // ===================== DETECTION CUMULS AUTOMATIQUE =====================
function detectCumuls(selMols){
if(!selMols||selMols.length<2)return [];
var byEffect={};
selMols.forEach(function(m){
var eff=moleculeEffects[m.nom]||[];
eff.forEach(function(e){if(!byEffect[e])byEffect[e]=[];byEffect[e].push(m.nom);});
});
var out=[];
Object.keys(byEffect).forEach(function(e){
var info=effectLabels[e];if(!info)return;
var mols=byEffect[e];
if(mols.length>=info.seuil){
out.push({key:e,label:info.l,icon:info.icon,col:info.col,count:mols.length,mols:mols,reco:info.reco});
}
});
// trier par sévérité (rouge d'abord puis orange...)
var sevOrder={"#dc2626":1,"#ea580c":2,"#f59e0b":3,"#a855f7":4,"#7c3aed":5,"#2563eb":6,"#16a34a":7,"#06b6d4":8};
out.sort(function(a,b){return (sevOrder[a.col]||9)-(sevOrder[b.col]||9);});
return out;
}

// ===================== INDEX ALPHABETIQUE =====================
function firstLetter(name){
if(!name)return '#';
// Supprimer accents et prendre 1ere lettre
var n=name.normalize('NFD').replace(/[̀-ͯ]/g,'').toUpperCase();
var c=n.charAt(0);
return /[A-Z]/.test(c)?c:'#';
}
function buildAlphaIndex(items,scrollPrefix){
var letters='ABCDEFGHIJKLMNOPQRSTUVWXYZ'.split('');
var available={};
items.forEach(function(it){available[firstLetter(it.nom)]=true});
var h='<div class="alpha-index">';
letters.forEach(function(L){
var has=available[L];
h+='<button class="'+(has?'':'alpha-disabled')+'" '+(has?'onclick="scrollToLetter(\''+scrollPrefix+'\',\''+L+'\')"':'')+'>'+L+'</button>';
});
h+='</div>';
return h;
}
function scrollToLetter(prefix,letter){
var el=document.querySelector('[data-'+prefix+'letter="'+letter+'"]');
if(el){
// petit décalage pour ne pas être caché par la sticky bar
var top=el.getBoundingClientRect().top+window.scrollY-110;
window.scrollTo({top:top,behavior:'smooth'});
// flash visuel
el.style.transition='box-shadow .6s ease,transform .3s ease';
el.style.boxShadow='0 0 0 3px var(--accent)';
el.style.transform='scale(1.02)';
setTimeout(function(){el.style.boxShadow='';el.style.transform='';},900);
}
}

// Distance de Levenshtein (tolérance fautes de frappe)
function lev(a,b){if(!a||!b)return 99;var m=a.length,n=b.length;if(Math.abs(m-n)>3)return 99;var dp=[];for(var i=0;i<=m;i++){dp.push([]);for(var j=0;j<=n;j++)dp[i].push(0);}for(var i=0;i<=m;i++)dp[i][0]=i;for(var j=0;j<=n;j++)dp[0][j]=j;for(var i=1;i<=m;i++)for(var j=1;j<=n;j++)dp[i][j]=a[i-1]===b[j-1]?dp[i-1][j-1]:1+Math.min(dp[i-1][j-1],dp[i-1][j],dp[i][j-1]);return dp[m][n];}
function fuzzy(hay,q){if(!q)return true;hay=hay.toLowerCase();q=q.toLowerCase().trim();if(hay.includes(q))return true;if(q.length<5)return false;var tokens=hay.split(/[\s,()\/\-]+/);for(var i=0;i<tokens.length;i++){var t=tokens[i];if(t.length>=4&&lev(t,q)<=2)return true;}return false;}

var patientData={age:'',poids:'',sexe:'M',creat:'',glyc:'',na:'',k:'',cl:'',hco3:'',ph:'',lact:'',trop:'',ecg:'',toxU:[],fr:'',ta:'',gcs:'',timeline:[],doses:{},delais:{}};
var toxOptions=['Cocaïne','Amphétamines/MDMA','Cannabis (THC)','Opioïdes','Benzodiazépines','Barbituriques','ADT','Méthadone','Buprénorphine','LSD','Kétamine','GHB'];

// Helper: seuil toxique numérique d'une molécule.
// REFACTOR (données structurées) : lit le champ structuré m.seuil (source de vérité) au lieu de parser
// doseToxique. Le texte affiché (m.doseToxique) reste inchangé. Le parseur regex n'est
// conservé qu'en repli défensif si une molécule n'avait pas de champ seuil renseigné.
function extractDoseSeuil(m){
if(!m)return null;
if(m.seuil&&m.seuil.valeur!=null){
  var s=m.seuil;
  if(s.parKg){var w=parseFloat(patientData.poids)||70;return {val:s.valeur*w,unit:'mg',raw:s.raw,perKg:s.valeur};}
  return {val:s.valeur,unit:'mg',raw:s.raw};
}
if(m.seuil===null)return null; // champ explicitement "non quantifiable"
// --- repli legacy (uniquement si le champ structuré est absent) ---
if(!m.doseToxique)return null;
var str=m.doseToxique;
var mk=str.match(/(\d+(?:\.\d+)?)\s*mg\/kg/);
if(mk){var w2=parseFloat(patientData.poids)||70;return {val:parseFloat(mk[1])*w2,unit:'mg',raw:mk[1]+' mg/kg',perKg:parseFloat(mk[1])};}
var mg=str.match(/(\d+(?:\.\d+)?)\s*g\b(?!\/)/);
if(mg)return {val:parseFloat(mg[1])*1000,unit:'mg',raw:mg[1]+' g'};
var mm=str.match(/(\d+(?:\.\d+)?)\s*mg\b/);
if(mm)return {val:parseFloat(mm[1]),unit:'mg',raw:mm[1]+' mg'};
return null;
}

// Helper: antidotes d'une molécule.
// REFACTOR (données structurées) : lit la liste explicite m.antidotes (source de vérité) au lieu de
// deviner par regex dans le texte de traitement (qui produisait des faux positifs :
// "NaCl"→NAC, "pneumopatHIE"→HIE, "Hydroxocobalamine NON indiquée", etc.).
function detectAntidote(m){
if(m&&Array.isArray(m.antidotes))return m.antidotes;
return [];
}
// Helper: antidotes / traitements explicitement CONTRE-INDIQUÉS pour cette molécule.
function getAntidotesCI(m){
return (m&&Array.isArray(m.antidotesContreIndiques))?m.antidotesContreIndiques:[];
}

// Helper: classer un signe dans une phase selon mots-clés
function classifyPhase(sigText){
var t=sigText.toLowerCase();
if(/phase 1|0-2h|0-4h|0-6h|immédiat|précoce|début|brutal|< ?[12345]h|d'embl/.test(t))return 'immediat';
// 'precoce' : motifs courts uniquement. Le motif générique « 12- » a été retiré car il
// capturait des fenêtres tardives (« 12-48h » → choc/IHC) en les classant à tort en précoce.
// (?<![0-9]) : « 6h » ne doit pas matcher dans « 96h »/« 16h » (mêmes faux positifs que « 12- »).
if(/2-6h|4-6h|2-12h|(?<![0-9])6h/.test(t))return 'precoce';
if(/6-24h|12-24h|(?<![0-9])24h|phase 2|intermédiaire|j2/.test(t))return 'intermediaire';
if(/24-48|12-48|12-72|48-|72|tardif|retardé|j3|j5|j7|post-intervallaire|nadir|fulminante|fibrose|séquelle/.test(t))return 'tardive';
return 'precoce';
}

function exportCaseJSON(){

function loadCaseJSON(){

inp.onchange=function(e){
var f=e.target.files[0];if(!f)return;
var r=new FileReader();
r.onload=function(ev){
try{
var data=JSON.parse(ev.target.result);
if(!confirm('Charger ce cas patient ?\nLes données actuelles seront écrasées.'))return;
patientData=Object.assign({age:'',poids:'',sexe:'M',creat:'',glyc:'',na:'',k:'',cl:'',hco3:'',ph:'',lact:'',trop:'',ecg:'',toxU:[],fr:'',ta:'',gcs:'',timeline:[],doses:{},delais:{}},data.patient||{});
// retrouver les indices des molécules par nom
selected=[];patientData.doses={};patientData.delais={};
(data.molecules||[]).forEach(function(nm){
var i=molecules.findIndex(function(m){return m.nom===nm;});
if(i>=0){selected.push(i);if(data.doses&&data.doses[nm])patientData.doses[i]=data.doses[nm];if(data.delais&&data.delais[nm])patientData.delais[i]=data.delais[nm];}
});
render();
alert('Cas chargé : '+selected.length+' molécule(s) restaurée(s).');
}catch(err){alert('Fichier JSON invalide : '+err.message);}
};
r.readAsText(f);
};
inp.click();
}

function renderSimulatorOutput(selMols){
var h='<div class="detail-section" style="margin-bottom:14px"><h4>📊 Sévérité prédite par molécule</h4><div style="display:flex;flex-direction:column;gap:8px">';
selMols.forEach(function(m,n){
var idx=selected[n];
var dose=parseFloat(patientData.doses[idx]);
if(!dose)return;
var seuil=extractDoseSeuil(m);
var sev,col,ratio=null;
if(seuil&&seuil.val){
ratio=dose/seuil.val;
if(ratio<0.5){sev='Asymptomatique probable';col='var(--green)';}
else if(ratio<1){sev='Symptômes possibles';col='var(--blue)';}
else if(ratio<2){sev='Toxicité modérée attendue';col='var(--yellow)';}
else if(ratio<4){sev='Toxicité SÉVÈRE';col='var(--orange)';}
else{sev='Dose POTENTIELLEMENT LÉTALE';col='var(--red)';}
}else{sev='Évaluation non quantifiable';col='var(--dim)';}

});
h+='</div></div>';

var idx=selected[n];var dose=parseFloat(patientData.doses[idx]);if(!dose)return;
var seuil=extractDoseSeuil(m);var ratio=seuil?(dose/seuil.val):0;
m.signes.forEach(function(s){
if(s.g&&ratio>=1)allGraves.push({mol:m.nom,t:s.t});
if(!s.g||ratio>=0.5)allFreq.push({mol:m.nom,t:s.t,grave:s.g});
});
});
if(allGraves.length){h+='<div style="margin-bottom:10px"><strong style="color:var(--red);font-size:.85rem;display:block;margin-bottom:6px">⚠️ Signes de gravité attendus</strong><ul style="padding-left:20px;margin:0">';

h+='</ul></div>';}

allFreq.forEach(function(s){h+='<li style="font-size:.82rem;margin:2px 0;color:'+(s.grave?'var(--red)':'var(--txt)')+'"><em>'+s.mol+'</em> — '+s.t+'</li>'});
h+='</ul></div></div>';
// Timeline attendue par phase

h+='<div class="detail-section"><h4>📅 Timeline attendue</h4>';
phases.forEach(function(p){
var items=[];
selMols.forEach(function(m,n){
var idx=selected[n];if(!patientData.doses[idx])return;
m.signes.forEach(function(s){if(classifyPhase(s.t)===p.k)items.push({mol:m.nom,t:s.t,g:s.g});});
});
h+='<div style="margin-bottom:14px;padding:10px 14px;background:var(--sec);border-radius:10px;border-left:3px solid '+p.col+'"><strong style="color:'+p.col+';font-size:.88rem;display:block;margin-bottom:6px">'+p.l+'</strong>';
if(items.length===0)h+='<p style="font-size:.78rem;color:var(--dim);font-style:italic">— Aucun signe attendu à cette phase —</p>';
else{h+='<ul style="padding-left:20px;margin:0">';items.forEach(function(it){h+='<li style="font-size:.82rem;margin:3px 0;color:'+(it.g?'var(--red)':'var(--txt)')+'"><strong>'+it.mol+' :</strong> '+it.t+'</li>'});h+='</ul>';}
h+='</div>';
});
h+='</div>';
// Cumuls détectés
var molsWithDose=selMols.filter(function(m,n){return patientData.doses[selected[n]];});
if(molsWithDose.length>=2){

}}

}

function computePatient(){
var el=document.getElementById('calcValues');if(!el)return;var h='';
var na=parseFloat(patientData.na),cl=parseFloat(patientData.cl),hco3=parseFloat(patientData.hco3),k=parseFloat(patientData.k),ph=parseFloat(patientData.ph),glyc=parseFloat(patientData.glyc);
var lact=parseFloat(patientData.lact),trop=parseFloat(patientData.trop);
var fr=parseFloat(patientData.fr),ta=parseFloat(patientData.ta),gcs=parseFloat(patientData.gcs);
if(na&&cl&&hco3){var tan=na-cl-hco3;h+='<p style="padding:8px 0;border-bottom:1px solid var(--border)"><strong>Trou anionique:</strong> '+tan.toFixed(1)+' mmol/L '+(tan>16?'<span style="color:var(--red)">⚠️ Élevé — chercher MUDPILES</span>':tan<8?'<span style="color:var(--orange)">⚠️ Bas</span>':'<span style="color:var(--green)">✓</span>')+'</p>';}
if(na&&glyc){var nac=na+1.6*(glyc-1);h+='<p style="padding:8px 0;border-bottom:1px solid var(--border)"><strong>Na⁺ corrigée (Katz):</strong> '+nac.toFixed(1)+' mmol/L</p>';}
if(k&&ph){var kc=k+6*(ph-7.40);h+='<p style="padding:8px 0;border-bottom:1px solid var(--border)"><strong>K⁺ corrigée pH:</strong> '+kc.toFixed(1)+' mmol/L</p>';}
if(patientData.age&&patientData.poids&&patientData.creat){
var age=parseFloat(patientData.age),w=parseFloat(patientData.poids),cr=parseFloat(patientData.creat);
var cg=((140-age)*w)/(0.814*cr)*(patientData.sexe==='F'?0.85:1);
h+='<p style="padding:8px 0;border-bottom:1px solid var(--border)"><strong>Cockcroft-Gault:</strong> '+cg.toFixed(1)+' mL/min '+(cg>=90?'<span style="color:var(--green)">✓</span>':cg>=60?'<span style="color:var(--orange)">IRC légère</span>':cg>=30?'<span style="color:var(--orange)">IRC modérée</span>':'<span style="color:var(--red)">⚠️ IRC sévère — adapter posologies</span>')+'</p>';}
if(lact){var lc=lact>4?'var(--red)':lact>2?'var(--orange)':'var(--green)';var li=lact>10?' ⚠️ Évoquer CYANURE / METFORMINE / choc':lact>4?' Hyperlactatémie sévère':lact>2?' Hyperlactatémie':' Normal';h+='<p style="padding:8px 0;border-bottom:1px solid var(--border)"><strong>Lactates:</strong> '+lact.toFixed(1)+' mmol/L <span style="color:'+lc+'">'+li+'</span></p>';}
if(trop){var tc=trop>14?'var(--red)':'var(--green)';h+='<p style="padding:8px 0;border-bottom:1px solid var(--border)"><strong>Troponine:</strong> '+trop+' ng/L <span style="color:'+tc+'">'+(trop>14?'⚠️ Souffrance myocardique':'Normale (<14)')+'</span></p>';}
// qSOFA
if(!isNaN(fr)&&!isNaN(ta)&&!isNaN(gcs)){
var q=0;if(fr>=22)q++;if(ta<100)q++;if(gcs<15)q++;
var qc=q>=2?'var(--red)':'var(--green)';
h+='<p style="padding:8px 0;border-bottom:1px solid var(--border)"><strong>qSOFA:</strong> <span style="color:'+qc+';font-weight:700">'+q+'/3</span> '+(q>=2?' ⚠️ Risque élevé de sepsis — réévaluation rapprochée':' Faible risque')+'</p>';
}
// ECG free text
if(patientData.ecg&&patientData.ecg.trim())h+='<p style="padding:8px 0;border-bottom:1px solid var(--border)"><strong>ECG:</strong> '+patientData.ecg+'</p>';
// Tox urinaires
if(patientData.toxU.length>0)h+='<p style="padding:8px 0"><strong>Tox urinaires +:</strong> '+patientData.toxU.join(', ')+'</p>';
el.innerHTML=h||'<p style="color:var(--dim);font-size:.85rem">Renseignez les données puis cliquez Calculer</p>';}

function tgHbcoAdvice(c){
if(isNaN(c)) return '';
var col,titre,reco;
if(c<3){col='var(--green)';titre='Probablement non significatif';reco=['Non-fumeur < 3 % / fumeur < 10 % : si ASYMPTOMATIQUE, pas de traitement spécifique','Éviction + recherche de la source (chaudière, brasero, incendie, groupe électrogène)','Interpréter selon la clinique et le statut tabagique'];}
else if(c<25){col='var(--orange)';titre='Intoxication confirmée — O₂ normobare';reco=['O₂ 100 % au masque haute concentration 15 L/min, ≥ 12 h (ne pas attendre le dosage)','ECG + troponine (souffrance myocardique fréquente)','Si incendie : rechercher une co-intoxication au cyanure (lactates ≥ 8-10 → hydroxocobalamine)','OHB à discuter si signe neuro/cardiaque, grossesse, ou symptômes persistants à 4-6 h'];}
else {col='var(--red)';titre='Forme grave — caisson hyperbare (OHB)';reco=['O₂ 100 % immédiat + transfert pour OHB','OHB : HbCO ≥ 25 % (≥ 15 % enfant / femme enceinte ; systématique si perte de connaissance initiale), coma, signe neuro/cardiaque','Réanimation : intubation si GCS < 8, amines si choc, bicarbonate si acidose sévère','Délai OHB optimal < 6 h'];}
var h='<div style="margin-top:14px;border-left:4px solid '+col+';background:var(--card);border-radius:10px;padding:10px 14px">';

h+='</ul></div>';
h+='<div style="margin-top:10px;padding:8px 12px;background:rgba(220,38,38,.08);border-left:3px solid var(--red);border-radius:8px;font-size:.78rem;line-height:1.5"><strong style="color:var(--red)">La clinique prime sur le chiffre.</strong> OHB quelle que soit la valeur si : perte de connaissance (même brève), signe neuro/cardiaque, grossesse symptomatique, ou symptômes persistant après O₂. L’HbCO n’est PAS corrélée à la gravité ni au risque de syndrome post-intervallaire.</div>';

}

function updRumDelta(){
var el=document.getElementById('rumDelta');if(!el)return;
if(rumD.ingT&&rumD.dosT){
var d=(new Date(rumD.dosT)-new Date(rumD.ingT))/36e5;
if(d<0)el.innerHTML='<span style="color:var(--red)">⚠️ Heure de dosage antérieure à l\'ingestion</span>';
else if(d<4)el.innerHTML='⏱ Δt = '+d.toFixed(1)+'h — <span style="color:var(--orange)">Dosage trop précoce</span>';
else if(d>24)el.innerHTML='⏱ Δt = '+d.toFixed(1)+'h — <span style="color:var(--red)">Hors nomogramme (>24h)</span>';
else el.innerHTML='⏱ Δt = <strong>'+d.toFixed(1)+'h</strong> post-ingestion';
}else el.innerHTML='<span style="color:var(--dim)">Renseignez les deux horaires</span>';
drawRumackCanvas();}

function drawRumackCanvas(){
var cv=document.getElementById('rumCanvas');if(!cv)return;
var ctx=cv.getContext('2d');var W=700,H=420;cv.width=W;cv.height=H;
var dk=document.documentElement.getAttribute('data-theme')==='dark';
var tc=dk?'#c1c2c5':'#374151',gc=dk?'#2d3654':'#e5e7eb',bg=dk?'#161b2e':'#ffffff';
ctx.fillStyle=bg;ctx.fillRect(0,0,W,H);
var ml=75,mr=25,mt=25,mb=55,pw=W-ml-mr,ph=H-mt-mb;
var mnH=4,mxH=24,lgMn=0,lgMx=3;
function xP(h){return ml+((h-mnH)/(mxH-mnH))*pw}
function yP(c){return mt+((lgMx-Math.log10(c))/(lgMx-lgMn))*ph}
ctx.strokeStyle=gc;ctx.lineWidth=0.5;
[1,2,5,10,20,50,100,200,500,1000].forEach(function(c){
var y=yP(c);ctx.beginPath();ctx.moveTo(ml,y);ctx.lineTo(W-mr,y);ctx.stroke();
ctx.fillStyle=tc;ctx.font='11px Inter,system-ui';ctx.textAlign='right';ctx.fillText(c,ml-10,y+4)});
for(var h=4;h<=24;h+=2){var x=xP(h);ctx.beginPath();ctx.moveTo(x,mt);ctx.lineTo(x,H-mb);ctx.stroke();
ctx.fillStyle=tc;ctx.font='11px Inter,system-ui';ctx.textAlign='center';ctx.fillText(h+'h',x,H-mb+16)}
ctx.fillStyle=tc;ctx.font='600 12px Inter,system-ui';ctx.textAlign='center';ctx.fillText('Heures post-ingestion',ml+pw/2,H-8);
ctx.save();ctx.translate(14,mt+ph/2);ctx.rotate(-Math.PI/2);ctx.fillText('Concentration (µg/mL)',0,0);ctx.restore();
// zones
ctx.fillStyle=dk?'rgba(239,68,68,.12)':'rgba(239,68,68,.08)';ctx.beginPath();ctx.moveTo(xP(4),mt);ctx.lineTo(xP(24),mt);ctx.lineTo(xP(24),yP(6.25));ctx.lineTo(xP(12),yP(50));ctx.lineTo(xP(4),yP(200));ctx.closePath();ctx.fill();
ctx.fillStyle=dk?'rgba(249,115,22,.12)':'rgba(249,115,22,.08)';ctx.beginPath();ctx.moveTo(xP(4),yP(200));ctx.lineTo(xP(12),yP(50));ctx.lineTo(xP(24),yP(6.25));ctx.lineTo(xP(24),yP(4.7));ctx.lineTo(xP(12),yP(37.5));ctx.lineTo(xP(4),yP(150));ctx.closePath();ctx.fill();
ctx.fillStyle=dk?'rgba(34,197,94,.08)':'rgba(34,197,94,.06)';ctx.beginPath();ctx.moveTo(xP(4),yP(150));ctx.lineTo(xP(12),yP(37.5));ctx.lineTo(xP(24),yP(4.7));ctx.lineTo(xP(24),H-mb);ctx.lineTo(xP(4),H-mb);ctx.closePath();ctx.fill();
// lines
function dL(pts,col){ctx.strokeStyle=col;ctx.lineWidth=2.5;ctx.setLineDash([]);ctx.beginPath();pts.forEach(function(p,i){i===0?ctx.moveTo(xP(p.h),yP(p.c)):ctx.lineTo(xP(p.h),yP(p.c))});ctx.stroke()}
dL([{h:4,c:200},{h:12,c:50},{h:24,c:6.25}],dk?'#f87171':'#dc2626');
dL([{h:4,c:150},{h:12,c:37.5},{h:24,c:4.7}],dk?'#fb923c':'#ea580c');
// patient point
if(rumD.ingT&&rumD.dosT&&rumD.conc){
var dH=(new Date(rumD.dosT)-new Date(rumD.ingT))/36e5;
var cUg=parseFloat(rumD.conc);
if(rumD.unit==='umol_L')cUg=cUg/6.614;
if(rumD.unit==='mg_L')cUg=cUg;
if(dH>=4&&dH<=24&&cUg>=1&&cUg<=1000){
var px=xP(dH),py=yP(cUg);
ctx.beginPath();ctx.arc(px,py,12,0,2*Math.PI);ctx.fillStyle=dk?'rgba(99,102,241,.3)':'rgba(99,102,241,.2)';ctx.fill();
ctx.beginPath();ctx.arc(px,py,6,0,2*Math.PI);ctx.fillStyle='#6366f1';ctx.fill();ctx.strokeStyle='#fff';ctx.lineWidth=2;ctx.stroke();
ctx.fillStyle=tc;ctx.font='600 11px Inter,system-ui';ctx.textAlign='left';ctx.fillText(cUg.toFixed(1)+' µg/mL @ '+dH.toFixed(1)+'h',px+14,py-4);
var c200At=200*Math.pow(6.25/200,(dH-4)/20);
var c150At=150*Math.pow(4.7/150,(dH-4)/20);
var res=document.getElementById('rumResult');
if(res){res.style.display='block';
if(cUg>=c200At)res.innerHTML='<span style="color:var(--red);font-weight:700;font-size:.95rem">⚠️ ZONE TOXIQUE — NAC indiqué</span>';
else if(cUg>=c150At)res.innerHTML='<span style="color:var(--orange);font-weight:700;font-size:.95rem">⚠ AU-DESSUS DE LA LIGNE DE TRAITEMENT — NAC indiquée</span>';
else res.innerHTML='<span style="color:var(--green);font-weight:700;font-size:.95rem">✓ Zone non toxique</span>';
}}}}

function bRenal(){
var h='<h4>🫘 Clairance rénale</h4>';
h+='<div class="detail-grid" style="grid-template-columns:1fr 1fr;gap:12px">';
h+='<div><label style="font-size:.8rem;font-weight:600;display:block;margin-bottom:4px">Âge</label><input type="number" id="rnAge" style="width:100%;padding:8px 10px;border:1.5px solid var(--border);border-radius:8px;background:var(--card);color:var(--txt);font-family:inherit" placeholder="ans"></div>';
h+='<div><label style="font-size:.8rem;font-weight:600;display:block;margin-bottom:4px">Poids (kg)</label><input type="number" id="rnW" style="width:100%;padding:8px 10px;border:1.5px solid var(--border);border-radius:8px;background:var(--card);color:var(--txt);font-family:inherit"></div>';
h+='<div><label style="font-size:.8rem;font-weight:600;display:block;margin-bottom:4px">Créatinine (µmol/L)</label><input type="number" id="rnCr" style="width:100%;padding:8px 10px;border:1.5px solid var(--border);border-radius:8px;background:var(--card);color:var(--txt);font-family:inherit"></div>';
h+='<div><label style="font-size:.8rem;font-weight:600;display:block;margin-bottom:4px">Sexe</label><select id="rnSx" style="width:100%;padding:8px 10px;border:1.5px solid var(--border);border-radius:8px;background:var(--card);color:var(--txt);font-family:inherit"><option value="M">Homme</option><option value="F">Femme</option></select></div>';

function cRenal(){
var age=parseFloat(document.getElementById('rnAge').value),w=parseFloat(document.getElementById('rnW').value),cr=parseFloat(document.getElementById('rnCr').value),sx=document.getElementById('rnSx').value;
var el=document.getElementById('rnRes');if(!el||!age||!w||!cr)return;
var cg=((140-age)*w)/(0.814*cr)*(sx==='F'?0.85:1);
var crMg=cr/88.4;var ckd;
if(sx==='F')ckd=144*Math.pow(Math.min(crMg/0.7,1),-0.329)*Math.pow(Math.max(crMg/0.7,1),-1.209)*Math.pow(0.9938,age);
else ckd=141*Math.pow(Math.min(crMg/0.9,1),-0.411)*Math.pow(Math.max(crMg/0.9,1),-1.209)*Math.pow(0.9938,age);
var h='<div class="detail-grid" style="grid-template-columns:1fr 1fr"><div class="stat-card"><div class="stat-label">Cockcroft-Gault</div><div class="stat-value">'+cg.toFixed(1)+'</div><p style="font-size:.78rem;color:var(--dim)">mL/min</p>';
h+=cg>=90?'<p style="color:var(--green);font-size:.82rem">✓ Normal</p>':cg>=60?'<p style="color:var(--orange);font-size:.82rem">IRC légère</p>':cg>=30?'<p style="color:var(--orange);font-size:.82rem">IRC modérée</p>':cg>=15?'<p style="color:var(--red);font-size:.82rem">IRC sévère</p>':'<p style="color:var(--red);font-size:.82rem">⚠️ IRC terminale</p>';
h+='</div><div class="stat-card"><div class="stat-label">CKD-EPI</div><div class="stat-value">'+ckd.toFixed(1)+'</div><p style="font-size:.78rem;color:var(--dim)">mL/min/1.73m²</p>';
h+=ckd>=90?'<p style="color:var(--green);font-size:.82rem">✓ G1</p>':ckd>=60?'<p style="color:var(--orange);font-size:.82rem">G2</p>':ckd>=45?'<p style="color:var(--orange);font-size:.82rem">G3a</p>':ckd>=30?'<p style="color:var(--orange);font-size:.82rem">G3b</p>':ckd>=15?'<p style="color:var(--red);font-size:.82rem">G4</p>':'<p style="color:var(--red);font-size:.82rem">G5</p>';
h+='</div></div>';el.innerHTML=h;}

function bNatremie(){

function cNa(){var na=parseFloat(document.getElementById('nNa').value),gl=parseFloat(document.getElementById('nGl').value);var el=document.getElementById('nRes');if(!el||!na||!gl)return;var c=na+1.6*(gl-1);var interp=c<135?'Hyponatrémie':c>145?'Hypernatrémie':'Normal';var col=c<135||c>145?'var(--red)':'var(--green)';el.innerHTML='<div class="stat-card"><div class="stat-value">'+c.toFixed(1)+'</div><p style="font-size:.82rem;color:var(--dim)">mmol/L — <span style="color:'+col+'">'+interp+'</span></p></div>';}

function bKalemie(){

function cK(){var k=parseFloat(document.getElementById('kV').value),ph=parseFloat(document.getElementById('kPH').value);var el=document.getElementById('kRes');if(!el||!k||!ph)return;var c=k+6*(ph-7.40);var interp=c<3.5?'Hypokaliémie':c>5.0?'Hyperkaliémie':'Normal';var col=(c<3.5||c>5.0)?'var(--red)':'var(--green)';el.innerHTML='<div class="stat-card"><div class="stat-value">'+c.toFixed(2)+'</div><p style="font-size:.82rem;color:var(--dim)">mmol/L — <span style="color:'+col+'">'+interp+'</span></p></div>';}

function bOsmolarite(){

h+='<div class="detail-grid" style="grid-template-columns:1fr 1fr 1fr;gap:10px"><div><label style="font-size:.8rem;font-weight:600;display:block;margin-bottom:4px">Na⁺</label><input type="number" id="tNa" step="any" style="width:100%;padding:8px 10px;border:1.5px solid var(--border);border-radius:8px;background:var(--card);color:var(--txt);font-family:inherit"></div><div><label style="font-size:.8rem;font-weight:600;display:block;margin-bottom:4px">Cl⁻</label><input type="number" id="tCl" step="any" style="width:100%;padding:8px 10px;border:1.5px solid var(--border);border-radius:8px;background:var(--card);color:var(--txt);font-family:inherit"></div><div><label style="font-size:.8rem;font-weight:600;display:block;margin-bottom:4px">HCO₃⁻</label><input type="number" id="tHC" step="any" style="width:100%;padding:8px 10px;border:1.5px solid var(--border);border-radius:8px;background:var(--card);color:var(--txt);font-family:inherit"></div></div>';

function cTAS(){
var na=parseFloat(document.getElementById('tNa').value),cl=parseFloat(document.getElementById('tCl').value),hc=parseFloat(document.getElementById('tHC').value);
var alb=parseFloat(document.getElementById('tAlb').value)||40;

function cDone(){

// ===================== PWA — Service Worker + Install =====================
var deferredInstallPrompt=null;
window.addEventListener('beforeinstallprompt',function(e){
  e.preventDefault();
  deferredInstallPrompt=e;
  var btn=document.getElementById('installBtn');
  if(btn){btn.style.display='inline-flex';}
});
window.addEventListener('appinstalled',function(){
  deferredInstallPrompt=null;
  var btn=document.getElementById('installBtn');if(btn)btn.style.display='none';
});
function triggerInstall(){
  if(!deferredInstallPrompt){
    var ua=navigator.userAgent||'';
    var isIOS=/iPad|iPhone|iPod/.test(ua)&&!window.MSStream;
    if(isIOS){alert('Installation iOS :\n1. Touchez le bouton Partager (carré + flèche) en bas\n2. Sélectionnez "Sur l\'écran d\'accueil"\n3. Confirmez "Ajouter"');return;}
    alert('Installation déjà effectuée, ou non disponible sur ce navigateur. Sur ordinateur, utilisez Chrome/Edge et l\'icône d\'installation dans la barre d\'adresse.');return;
  }
  deferredInstallPrompt.prompt();
  deferredInstallPrompt.userChoice.then(function(){deferredInstallPrompt=null;var btn=document.getElementById('installBtn');if(btn)btn.style.display='none';});
}
if('serviceWorker' in navigator){
  window.addEventListener('load',function(){
    navigator.serviceWorker.register('./sw.js').then(function(reg){
      // Détection d'une nouvelle version
      reg.addEventListener('updatefound',function(){
        var newSW=reg.installing;
        if(!newSW)return;
        newSW.addEventListener('statechange',function(){
          if(newSW.state==='installed'&&navigator.serviceWorker.controller){
            // Une nouvelle version est prête
            var bar=document.createElement('div');
            bar.style.cssText='position:fixed;top:0;left:0;right:0;background:var(--accent);color:#fff;padding:10px 16px;text-align:center;z-index:9999;font-weight:600;font-size:.88rem;box-shadow:0 2px 8px rgba(0,0,0,.2)';
            bar.innerHTML='🔄 Nouvelle version disponible <button onclick="this.parentNode.remove();navigator.serviceWorker.controller.postMessage(\'SKIP_WAITING\');location.reload()" style="margin-left:10px;background:#fff;color:var(--accent);border:none;padding:5px 14px;border-radius:6px;cursor:pointer;font-weight:700;font-family:inherit">Mettre à jour</button> <button onclick="this.parentNode.remove()" style="margin-left:6px;background:transparent;color:#fff;border:1.5px solid #fff;padding:5px 10px;border-radius:6px;cursor:pointer;font-family:inherit">Plus tard</button>';
            document.body.appendChild(bar);
          }
        });
      });
    }).catch(function(err){console.warn('SW registration failed:',err);});
  });
}
